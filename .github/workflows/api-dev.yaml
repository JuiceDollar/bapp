name: JuiceDollar dApp DEV CI/CD

on:
    push:
        branches: [develop]
    workflow_dispatch:

permissions:
    contents: read

env:
    DOCKER_TAGS: dfxswiss/juicedollar-dapp:beta
    AZURE_RESOURCE_GROUP: rg-dfx-api-dev
    AZURE_CONTAINER_APP_TESTNET: ca-dfx-jdtd-dev
    AZURE_CONTAINER_APP_MAINNET: ca-dfx-jdmd-dev
    DEPLOY_INFO: ${{ github.ref_name }}-${{ github.sha }}
    NEXT_PUBLIC_LANDINGPAGE_URL: https://juicedollar.com
    NEXT_PUBLIC_APP_URL: https://dev.bapp.juicedollar.com
    NEXT_PUBLIC_API_URL_TESTNET: https://dev.api.testnet.juicedollar.com/
    NEXT_PUBLIC_API_URL_MAINNET: https://dev.api.juicedollar.com/
    NEXT_PUBLIC_PONDER_URL_TESTNET: https://dev.ponder.testnet.juicedollar.com
    NEXT_PUBLIC_PONDER_URL_MAINNET: https://dev.ponder.juicedollar.com
    NEXT_PUBLIC_WAGMI_ID: ${{ secrets.NEXT_PUBLIC_WAGMI_ID }}
    NEXT_PUBLIC_CHAIN_NAME: mainnet
    NEXT_PUBLIC_RPC_URL_MAINNET: https://rpc.juiceswap.com/
    NEXT_PUBLIC_RPC_URL_TESTNET: https://rpc.testnet.juiceswap.com/

jobs:
    build-and-deploy:
        name: Build, test and deploy to DEV
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: .
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ${{ env.DOCKER_TAGS }}

            - name: Log in to Azure
              uses: azure/login@v2
              with:
                  creds: ${{ secrets.DFX_DEV_CREDENTIALS }}

            - name: Update Azure Container App (testnet)
              uses: azure/CLI@v2
              with:
                  inlineScript: |
                      az containerapp update --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --name ${{ env.AZURE_CONTAINER_APP_TESTNET }} --image ${{ env.DOCKER_TAGS }} --set-env-vars \
                        "NEXT_PUBLIC_LANDINGPAGE_URL=${{ env.NEXT_PUBLIC_LANDINGPAGE_URL }}" \
                        "NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}" \
                        "NEXT_PUBLIC_API_URL_TESTNET=${{ env.NEXT_PUBLIC_API_URL_TESTNET }}" \
                        "NEXT_PUBLIC_API_URL_MAINNET=${{ env.NEXT_PUBLIC_API_URL_MAINNET }}" \
                        "NEXT_PUBLIC_PONDER_URL_TESTNET=${{ env.NEXT_PUBLIC_PONDER_URL_TESTNET }}" \
                        "NEXT_PUBLIC_PONDER_URL_MAINNET=${{ env.NEXT_PUBLIC_PONDER_URL_MAINNET }}" \
                        "NEXT_PUBLIC_WAGMI_ID=${{ env.NEXT_PUBLIC_WAGMI_ID }}" \
                        "NEXT_PUBLIC_CHAIN_NAME=testnet" \
                        "NEXT_PUBLIC_RPC_URL_MAINNET=${{ env.NEXT_PUBLIC_RPC_URL_MAINNET }}" \
                        "NEXT_PUBLIC_RPC_URL_TESTNET=${{ env.NEXT_PUBLIC_RPC_URL_TESTNET }}" \
                        "DEPLOY_INFO=${{ env.DEPLOY_INFO }}"

            - name: Update Azure Container App (mainnet)
              uses: azure/CLI@v2
              with:
                  inlineScript: |
                      az containerapp update --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --name ${{ env.AZURE_CONTAINER_APP_MAINNET }} --image ${{ env.DOCKER_TAGS }} --set-env-vars \
                        "NEXT_PUBLIC_LANDINGPAGE_URL=${{ env.NEXT_PUBLIC_LANDINGPAGE_URL }}" \
                        "NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}" \
                        "NEXT_PUBLIC_API_URL_TESTNET=${{ env.NEXT_PUBLIC_API_URL_TESTNET }}" \
                        "NEXT_PUBLIC_API_URL_MAINNET=${{ env.NEXT_PUBLIC_API_URL_MAINNET }}" \
                        "NEXT_PUBLIC_PONDER_URL_TESTNET=${{ env.NEXT_PUBLIC_PONDER_URL_TESTNET }}" \
                        "NEXT_PUBLIC_PONDER_URL_MAINNET=${{ env.NEXT_PUBLIC_PONDER_URL_MAINNET }}" \
                        "NEXT_PUBLIC_WAGMI_ID=${{ env.NEXT_PUBLIC_WAGMI_ID }}" \
                        "NEXT_PUBLIC_CHAIN_NAME=mainnet" \
                        "NEXT_PUBLIC_RPC_URL_MAINNET=${{ env.NEXT_PUBLIC_RPC_URL_MAINNET }}" \
                        "NEXT_PUBLIC_RPC_URL_TESTNET=${{ env.NEXT_PUBLIC_RPC_URL_TESTNET }}" \
                        "DEPLOY_INFO=${{ env.DEPLOY_INFO }}"

            - name: Logout from Azure
              run: |
                  az logout
              if: always()
