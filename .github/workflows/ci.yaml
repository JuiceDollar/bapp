name: CI Tests

on:
    pull_request:
        branches: [develop, main]
    push:
        branches: [develop]

permissions:
    contents: read

env:
    NEXT_PUBLIC_LANDINGPAGE_URL: https://juicedollar.com
    NEXT_PUBLIC_APP_URL: https://dev.app.testnet.juicedollar.com
    NEXT_PUBLIC_API_URL_TESTNET: https://dev.api.testnet.juicedollar.com/
    NEXT_PUBLIC_API_URL_MAINNET: https://dev.api.juicedollar.com/
    NEXT_PUBLIC_PONDER_URL_TESTNET: https://dev.ponder.testnet.juicedollar.com
    NEXT_PUBLIC_PONDER_URL_MAINNET: https://dev.ponder.juicedollar.com
    NEXT_PUBLIC_WAGMI_ID: test-project-id
    NEXT_PUBLIC_CHAIN_NAME: testnet
    NEXT_PUBLIC_RPC_URL_MAINNET: https://rpc.testnet.juiceswap.com/
    NEXT_PUBLIC_RPC_URL_TESTNET: https://rpc.testnet.juiceswap.com/

jobs:
    test:
        name: Lint & Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "yarn"

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Lint check
              run: yarn lint

            - name: Prettier check
              run: yarn lint:check

            - name: Build
              run: yarn build

    e2e-smoke:
        name: E2E Smoke Tests
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "yarn"

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Install Playwright browsers
              run: npx playwright install chromium --with-deps

            - name: Build app
              run: yarn build

            - name: Run E2E smoke tests
              run: yarn test:e2e:smoke
              env:
                  PLAYWRIGHT_BASE_URL: ${{ env.NEXT_PUBLIC_APP_URL }}

            - name: Upload Playwright report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7

            - name: Upload test results on failure
              uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: playwright-traces
                  path: test-results/
                  retention-days: 7
